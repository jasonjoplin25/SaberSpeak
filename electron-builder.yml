appId: com.saberspeak.app
productName: SaberSpeak
copyright: SaberSpeak

asar: true

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - "!dist/**/*.map"

extraResources:
  - from: bundled-python
    to: bundled-python
    filter:
      - "**/*"

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SaberSpeak
  runAfterFinish: true
